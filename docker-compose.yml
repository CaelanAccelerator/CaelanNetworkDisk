version: '3.9'

services:

  mysql:
    image: mysql:8.0
    container_name: nd-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: networkdisk_v2
    volumes:
      - mysql-data:/var/lib/mysql

  minio:
    image: minio/minio:latest
    container_name: nd-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console  →  http://localhost:9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  kafka:
    image: apache/kafka:latest
    container_name: nd-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Uncomment when starting Phase 2 (RAG)
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   container_name: nd-postgres
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_DB: networkdisk_ai
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: '123456'
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data

volumes:
  mysql-data:
  minio-data:
  kafka-data:
  # postgres-data:

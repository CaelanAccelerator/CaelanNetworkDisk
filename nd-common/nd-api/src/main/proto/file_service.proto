syntax = "proto3";

package com.disk.api.file;

option java_package = "com.disk.api.file";
option java_outer_classname = "FileServiceProto";
option java_multiple_files = true;

// Exposed by nd-files, consumed by nd-ai.
// nd-ai calls GetFileReadInfo to resolve a userFileId → physical path before RAG indexing.
service FileGrpcService {
  rpc GetFileReadInfo(FileReadRequest) returns (FileReadResponse);
}

message FileReadRequest {
  int64 user_file_id = 1;
  int64 user_id      = 2;
}

message FileReadResponse {
  bool   success   = 1;
  string message   = 2;
  FileReadData data = 3;
}

message FileReadData {
  int64  user_file_id  = 1;
  int64  real_file_id  = 2;
  string filename      = 3;
  string real_path     = 4;
  string file_suffix   = 5;
  string identifier    = 6;
  int64  file_size     = 7;
  int32  file_type     = 8;
}
